[build]
  command = "cd apps/web && npm install && npm run build"
  publish = "apps/web/.next"

[build.environment]
  NEXT_PRIVATE_STANDALONE = "false"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
